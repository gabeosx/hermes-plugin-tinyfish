name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    outputs:
      release_preexisting: ${{ steps.release.outputs.preexisting }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install -U pip
          python -m pip install build hatchling

      - name: Validate release metadata
        run: python scripts/validate_release.py --tag "${GITHUB_REF_NAME}" --notes-path release-notes.md

      - name: Build distributions
        run: python -m build

      - name: Create or refresh GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "preexisting=true" >> "${GITHUB_OUTPUT}"
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            echo "preexisting=false" >> "${GITHUB_OUTPUT}"
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          fi

  publish-pypi:
    if: vars.PYPI_PUBLISH_ENABLED == 'true' && needs.github-release.outputs.release_preexisting != 'true'
    needs: github-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install -U pip
          python -m pip install build
          python -m build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
