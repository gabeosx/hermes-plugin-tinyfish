name: Release
run-name: Release ${{ inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create and publish, for example v0.2.4"
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    outputs:
      pypi_exists: ${{ steps.pypi.outputs.exists }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || env.RELEASE_TAG }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install -U pip
          python -m pip install build hatchling

      - name: Validate release metadata
        run: python scripts/validate_release.py --tag "${RELEASE_TAG}" --notes-path release-notes.md

      - name: Build distributions
        run: python -m build

      - name: Create release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          git fetch origin --tags
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
            head_commit="$(git rev-parse HEAD)"
            if [ "$tag_commit" != "$head_commit" ]; then
              echo "${RELEASE_TAG} already points to ${tag_commit}, not ${head_commit}" >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Create or refresh GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "preexisting=true" >> "${GITHUB_OUTPUT}"
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            echo "preexisting=false" >> "${GITHUB_OUTPUT}"
            gh release create "${RELEASE_TAG}" dist/* \
              --verify-tag \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md
          fi

      - name: Check PyPI version
        id: pypi
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import urllib.error
          import urllib.request

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          url = f"https://pypi.org/pypi/hermes-plugin-tinyfish/{version}/json"
          exists = False
          try:
              with urllib.request.urlopen(url, timeout=15) as response:
                  exists = response.status == 200
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          with open(os.environ["GITHUB_OUTPUT"], "a") as output:
              output.write(f"exists={str(exists).lower()}\n")
          print(f"PyPI version {version} exists: {exists}")
          PY

  publish-pypi:
    if: needs.github-release.outputs.pypi_exists != 'true'
    needs: github-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build
        run: |
          python -m pip install -U pip
          python -m pip install build
          python -m build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
