name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Format check
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy hermes_plugin_tinyfish

      - name: Test
        run: pytest --cov=hermes_plugin_tinyfish --cov-report=term-missing

      - name: Build package
        run: python -m build

      - name: Entry point smoke test
        run: |
          python - <<'PY'
          import importlib.metadata
          eps = importlib.metadata.entry_points().select(group="hermes_agent.plugins")
          names = {ep.name for ep in eps}
          assert "web-tinyfish" in names, names
          module = next(ep for ep in eps if ep.name == "web-tinyfish").load()
          assert hasattr(module, "register")
          PY
