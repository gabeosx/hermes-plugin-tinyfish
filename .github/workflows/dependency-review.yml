name: Dependency Review

on:
  pull_request:
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base commit for an explicitly dispatched release-PR check
        required: true
        type: string
      head_ref:
        description: Head commit for an explicitly dispatched release-PR check
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          base-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.base_ref || '' }}
          head-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.head_ref || '' }}
