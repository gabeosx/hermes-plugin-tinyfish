name: Auto Release

on:
  push:
    branches: [main]

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.decide.outputs.action }}
      bump: ${{ steps.decide.outputs.bump }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Decide release action
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re
          import subprocess
          import sys

          root = pathlib.Path(".")
          sha = os.environ["GITHUB_SHA"]
          repo = os.environ["GITHUB_REPOSITORY"]

          def output(**values: str) -> None:
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  for key, value in values.items():
                      fh.write(f"{key}={value}\n")

          def gh_json(args: list[str]) -> object:
              result = subprocess.run(
                  ["gh", "api", *args],
                  check=False,
                  text=True,
                  capture_output=True,
              )
              if result.returncode != 0:
                  print(result.stderr, file=sys.stderr)
                  return []
              return json.loads(result.stdout or "[]")

          pulls = gh_json(
              [
                  f"/repos/{repo}/commits/{sha}/pulls",
                  "-H",
                  "Accept: application/vnd.github+json",
              ]
          )
          pr = pulls[0] if isinstance(pulls, list) and pulls else {}
          labels = {label.get("name", "") for label in pr.get("labels", []) if isinstance(label, dict)}

          changelog = (root / "CHANGELOG.md").read_text()
          unreleased_match = re.search(r"(?ms)^## Unreleased\n(?P<body>.*?)(?=^## \[|\Z)", changelog)
          unreleased_body = unreleased_match.group("body").strip() if unreleased_match else ""

          if "release:none" in labels:
              output(action="none", bump="")
              print("release:none label present; skipping release automation.")
              sys.exit(0)

          if unreleased_body:
              bump = "patch"
              for candidate in ("major", "minor", "patch"):
                  if f"release:{candidate}" in labels:
                      bump = candidate
                      break
              output(action="prepare", bump=bump)
              print(f"Unreleased changelog content found; preparing release PR with {bump} bump.")
              sys.exit(0)

          output(action="none", bump="")
          print("No unreleased content; skipping release automation.")
          PY

  prepare-release-pr:
    needs: decide
    if: needs.decide.outputs.action == 'prepare'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare release metadata
        id: prep
        run: python scripts/prepare_release.py --bump "${{ needs.decide.outputs.bump }}" --github-output

      - name: Validate generated files
        run: |
          git diff --check
          python -m pip install -U pip
          python -m pip install build hatchling
          python -m build

      - name: Open release PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: release/${{ steps.prep.outputs.tag }}
          title: Release ${{ steps.prep.outputs.tag }}
          commit-message: Release ${{ steps.prep.outputs.tag }}
          delete-branch: true
          body: |
            Automated release-prep PR for ${{ steps.prep.outputs.tag }}.

            This PR was opened after a feature PR with non-empty `Unreleased`
            changelog notes merged to `main`.

            Auto Release will explicitly run the protected-branch checks, merge
            this PR after they pass, and dispatch the trusted Release workflow.
            That workflow creates the `${{ steps.prep.outputs.tag }}` tag and
            GitHub Release, then publishes the package to PyPI.

      - name: Check, merge, and release
        timeout-minutes: 30
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_number="${{ steps.cpr.outputs.pull-request-number }}"
          release_tag="${{ steps.prep.outputs.tag }}"
          if [ -z "$pr_number" ]; then
            echo "create-pull-request did not return a release PR number" >&2
            exit 1
          fi

          pr_json="$(gh pr view "$pr_number" --json baseRefOid,headRefName,headRefOid,state)"
          pr_state="$(jq -r .state <<<"$pr_json")"
          base_sha="$(jq -r .baseRefOid <<<"$pr_json")"
          head_ref="$(jq -r .headRefName <<<"$pr_json")"
          head_sha="$(jq -r .headRefOid <<<"$pr_json")"
          if [ "$pr_state" != "OPEN" ]; then
            echo "release PR #${pr_number} is not open (state: ${pr_state})" >&2
            exit 1
          fi

          latest_run_id() {
            gh run list \
              --workflow "$1" \
              --branch "$head_ref" \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,headSha,createdAt \
              --jq "map(select(.headSha == \"${head_sha}\")) | sort_by(.createdAt) | last | .databaseId // empty"
          }

          wait_for_new_run() {
            workflow="$1"
            previous_id="$2"
            for _ in $(seq 1 30); do
              run_id="$(latest_run_id "$workflow")"
              if [ -n "$run_id" ] && [ "$run_id" != "$previous_id" ]; then
                gh run watch "$run_id" --interval 5 --exit-status
                return
              fi
              sleep 2
            done
            echo "timed out waiting for dispatched ${workflow} run" >&2
            exit 1
          }

          previous_ci="$(latest_run_id ci.yml)"
          previous_dependency_review="$(latest_run_id dependency-review.yml)"

          gh workflow run ci.yml --ref "$head_ref"
          gh workflow run dependency-review.yml \
            --ref "$head_ref" \
            -f base_ref="$base_sha" \
            -f head_ref="$head_sha"

          wait_for_new_run ci.yml "$previous_ci"
          wait_for_new_run dependency-review.yml "$previous_dependency_review"

          gh pr merge "$pr_number" --squash --match-head-commit "$head_sha"
          merged="$(gh pr view "$pr_number" --json mergedAt --jq '.mergedAt // empty')"
          if [ -z "$merged" ]; then
            echo "release PR #${pr_number} did not merge" >&2
            exit 1
          fi

          previous_release="$(
            gh run list \
              --workflow release.yml \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle,createdAt \
              --jq "map(select(.displayTitle == \"Release ${release_tag}\")) | sort_by(.createdAt) | last | .databaseId // empty"
          )"
          gh workflow run release.yml --ref main -f tag="$release_tag"

          for _ in $(seq 1 30); do
            release_run="$(
              gh run list \
                --workflow release.yml \
                --event workflow_dispatch \
                --limit 20 \
                --json databaseId,displayTitle,createdAt \
                --jq "map(select(.displayTitle == \"Release ${release_tag}\")) | sort_by(.createdAt) | last | .databaseId // empty"
            )"
            if [ -n "$release_run" ] && [ "$release_run" != "$previous_release" ]; then
              gh run watch "$release_run" --interval 5 --exit-status
              exit 0
            fi
            sleep 2
          done

          echo "timed out waiting for the dispatched Release workflow" >&2
          exit 1
