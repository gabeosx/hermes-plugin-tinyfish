name: Prepare Release Manually

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump to apply when version is omitted
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      version:
        description: Explicit version, for example 0.2.0. Overrides bump when set.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare release metadata
        id: prep
        run: |
          VERSION_INPUT="${{ inputs.version }}"
          ARGS=(--bump "${{ inputs.bump }}" --github-output)
          if [ -n "$VERSION_INPUT" ]; then
            ARGS+=(--version "$VERSION_INPUT")
          fi
          python scripts/prepare_release.py "${ARGS[@]}"

      - name: Validate generated files
        run: |
          git diff --check
          python -m pip install -U pip
          python -m pip install build hatchling
          python -m build

      - name: Open release PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: release/${{ steps.prep.outputs.tag }}
          title: Release ${{ steps.prep.outputs.tag }}
          commit-message: Release ${{ steps.prep.outputs.tag }}
          body: |
            Prepare ${{ steps.prep.outputs.tag }}.

            This PR was generated by the manual Prepare Release workflow. It updates:
            - `pyproject.toml`
            - `plugin.yaml`
            - `CHANGELOG.md`

            Merging this PR will automatically create and push the
            `${{ steps.prep.outputs.tag }}` tag. The tag will trigger the
            Release workflow, which builds artifacts and publishes the GitHub
            Release.
