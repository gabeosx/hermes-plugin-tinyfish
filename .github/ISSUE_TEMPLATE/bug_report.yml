name: Bug Report
description: Report a problem with the TinyFish Hermes plugin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: status
    attributes:
      label: Status Output
      description: Paste `hermes tinyfish status` output. Do not include secrets.
      render: text
  - type: input
    id: hermes
    attributes:
      label: Hermes Version
      placeholder: hermes --version
  - type: input
    id: install
    attributes:
      label: Install Method
      placeholder: "hermes plugins install / pip / other"
